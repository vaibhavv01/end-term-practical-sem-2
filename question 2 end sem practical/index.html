<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Name Display</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .display-section {
            margin-top: 30px;
            padding: 20px;
            background-color: #f5f5f5;
            border-radius: 5px;
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .display-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }

        .display-name {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            min-height: 35px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Enter Your Name</h1>
        
        <label for="nameInput">Name:</label>
        <input 
            type="text" 
            id="nameInput" 
            placeholder="Type your name here..."
            autocomplete="off"
        >
        
        <div class="display-section">
            <div>
                <div class="display-label">You entered:</div>
                <div class="display-name" id="displayName"></div>
            </div>
        </div>
    </div>

    <script>
        const nameInput = document.getElementById('nameInput');
        const displayName = document.getElementById('displayName');

        // Update the display in real-time as user types
        nameInput.addEventListener('input', function() {
            displayName.textContent = this.value;
        });
    </script>
</body>
</html>
